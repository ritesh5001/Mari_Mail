name: Keep backend awake

# Render free-tier services sleep after ~15 min of inactivity and take ~50s to
# cold-start. This pings the health endpoint every 10 minutes to keep it warm.
# Note: GitHub may delay scheduled runs under load, and disables the schedule
# after 60 days of no repo activity (a push or manual run re-arms it).

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /api/health
        run: |
          URL="https://marimail-5v22.onrender.com/api/health"
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo 000)
            if [ "$code" = "200" ]; then
              echo "Backend awake (HTTP $code) on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt got HTTP $code — retrying in 15s (cold start can take ~50s)"
            sleep 15
          done
          echo "Health check failed after 3 attempts"
          exit 1
